<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
PDF ↔ WORD
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="bg-blur blur1"></div>
<div class="bg-blur blur2"></div>

<div class="main-container">

<div class="glass-card">

<div class="logo">

<h1>
PDF ↔ WORD
</h1>

<p>
تحويل الملفات بسرعة وبدقة عالية
</p>

</div>

<form
action="/convert"
method="POST"
enctype="multipart/form-data">

<div class="upload-box">

<input
type="file"
name="file"
required>

</div>

<div class="select-box">

<select name="mode">

<option value="pdf_to_word">
PDF → Word
</option>

<option value="word_to_pdf">
Word → PDF
</option>

</select>

</div>

<button type="submit">

تحويل الملف

</button>

</form>

<div class="features">

<div class="feature">
⚡ سريع
</div>

<div class="feature">
🔒 آمن
</div>

<div class="feature">
🎨 تصميم احترافي
</div>

</div>

</div>

</div>

</body>
</html>
