<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
PDF ↔ WORD
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="glass-card">

<div class="top">

<h1>
PDF ↔ WORD
</h1>

<p>
تحويل الملفات بسرعة ودقة عالية
</p>

</div>

<form
action="/convert"
method="POST"
enctype="multipart/form-data">

<label class="upload-area">

<input
type="file"
name="file"
required>

<div class="upload-content">

<div class="upload-icon">
☁
</div>

<h3>
رفع الملف
</h3>

<p>
اسحب الملف أو اضغط هنا
</p>

</div>

</label>

<div class="select-wrapper">

<select name="mode">

<option value="pdf_to_word">
PDF → Word
</option>

<option value="word_to_pdf">
Word → PDF
</option>

</select>

</div>

<button type="submit">

تحويل الملف

</button>

</form>

<div class="bottom">

<div class="item">
⚡ سريع
</div>

<div class="item">
🔒 آمن
</div>

<div class="item">
✨ احترافي
</div>

</div>

</div>

</div>

</body>
</html>
